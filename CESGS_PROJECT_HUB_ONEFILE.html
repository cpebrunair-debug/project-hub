<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CESGS · Project Hub</title>

<style>
:root {
  --font-title:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --font-desc:'Aptos Display','Aptos','Segoe UI',Arial,sans-serif;
  --ink:#0D0A1E;--ink2:#3D3756;--ink3:#8B85A0;
  --cream:#FAF8F3;--white:#FFFFFF;
  --teal:#0B8C7A;--teal-light:#E0F5F2;--teal-mid:#2DC4A8;
  --gold:#C9891A;--gold-light:#FDF3E0;
  --red:#C13B3B;--red-light:#FDEAEA;
  --blue:#1A55C9;--blue-light:#E5EEFF;
  --border:rgba(13,10,30,0.09);--border2:rgba(13,10,30,0.15);
  --radius:16px;--radius-sm:10px;
  --shadow:0 4px 24px rgba(13,10,30,0.08);
  --shadow-md:0 8px 40px rgba(13,10,30,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-desc);background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ═══ LANDING PAGE ═══ */
.landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 60px;background:linear-gradient(180deg,#f8fffe 0%,#eefcf8 38%,#ecf7ff 100%);position:relative;overflow:hidden}
.landing::before{content:'';position:absolute;top:-20%;left:-10%;width:70%;height:80%;background:radial-gradient(ellipse at center,rgba(45,196,168,0.26) 0%,rgba(45,196,168,0.12) 38%,transparent 72%);pointer-events:none;filter:blur(56px)}
.landing::after{content:'';position:absolute;bottom:-30%;right:-15%;width:80%;height:90%;background:radial-gradient(ellipse at center,rgba(26,85,201,0.14) 0%,rgba(45,196,168,0.14) 38%,transparent 70%);pointer-events:none;filter:blur(74px)}
.landing-header{text-align:center;margin-bottom:48px;position:relative;z-index:1}
.landing-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0B8C7A,#2DC4A8);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 32px rgba(11,140,122,0.3)}
.landing-logo svg{width:30px;height:30px}
.landing-tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--teal-mid);font-weight:600;margin-bottom:12px}
.landing-title{font-family:var(--font-title);font-size:46px;font-weight:600;color:#0D5C63;line-height:1.1;background:linear-gradient(135deg,#0D5C63 0%,#0B8C7A 52%,#1A55C9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.landing-sub{font-size:15px;color:rgba(21,86,96,0.72);margin-top:14px;max-width:520px;line-height:1.7}
.project-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:960px;width:100%;margin-bottom:40px;position:relative;z-index:1}
@media(max-width:800px){.project-grid{grid-template-columns:1fr}}

.project-card{
  background:rgba(255,255,255,0.8);border-radius:var(--radius);border:1px solid rgba(45,196,168,0.18);
  overflow:hidden;cursor:pointer;transition:all 0.3s;position:relative;backdrop-filter:blur(12px);box-shadow:0 12px 36px rgba(26,85,201,0.08);
}
.project-card:hover{transform:translateY(-6px);box-shadow:0 16px 44px rgba(11,140,122,0.16);border-color:rgba(45,196,168,0.35);background:#ffffff}
.pc-accent{height:3px;opacity:0.8}
.pc-body{padding:28px 24px}
.pc-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.pc-name{font-family:var(--font-title);font-size:20px;font-weight:600;margin-bottom:6px;color:#0D0A1E}
.pc-org{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.pc-desc{font-size:13px;color:rgba(21,86,96,0.68);line-height:1.6;margin-bottom:18px}
.pc-status{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:600}
.pc-collab{margin-top:16px;padding-top:14px;border-top:1px solid rgba(26,85,201,0.08);display:flex;align-items:center;gap:8px}
.pc-collab-count{font-size:12px;color:rgba(21,86,96,0.6)}
.pc-collab-avatars{display:flex}
.pc-av{width:24px;height:24px;border-radius:50%;border:2px solid rgba(10,14,23,0.8);font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;color:#fff;margin-left:-6px}
.pc-av:first-child{margin-left:0}
.landing-footer{position:relative;z-index:1;text-align:center;color:rgba(21,86,96,0.45);font-size:12px;margin-top:20px}

/* ═══ PASSWORD GATE ═══ */
.pw-overlay{position:fixed;inset:0;background:rgba(10,14,23,0.85);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;z-index:999}
.pw-overlay.show{display:flex}
.pw-box{background:#141a2a;border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:36px;width:380px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,0.5);text-align:center}
.pw-box-title{font-family:var(--font-title);font-size:22px;font-weight:600;margin-bottom:6px;color:#fff}
.pw-box-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px;line-height:1.5}
.pw-inp{width:100%;height:44px;border:1.5px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);padding:0 16px;font-size:14px;font-family:var(--font-desc);text-align:center;letter-spacing:2px;outline:none;transition:border-color 0.2s;background:rgba(255,255,255,0.05);color:#fff}
.pw-inp:focus{border-color:var(--teal-mid)}
.pw-inp::placeholder{color:rgba(255,255,255,0.2)}
.pw-inp.error{border-color:var(--red);animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pw-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
.pw-btn{width:100%;height:42px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:var(--font-desc);cursor:pointer;margin-top:16px;transition:all 0.15s;background:linear-gradient(135deg,#0B8C7A,#2DC4A8);color:#fff}
.pw-btn:hover{opacity:0.9}
.pw-btn:active{transform:scale(0.97)}
.pw-back{background:none;border:none;font-size:13px;color:rgba(255,255,255,0.35);cursor:pointer;margin-top:16px;font-family:var(--font-desc)}
.pw-back:hover{color:rgba(255,255,255,0.7)}

/* ═══ SIDEBAR ═══ */
.sidebar{position:fixed;top:0;left:0;height:100vh;width:240px;background:linear-gradient(180deg,#f7fffd 0%,#f0fbff 55%,#f5f8ff 100%);border-right:1px solid rgba(11,140,122,0.12);display:flex;flex-direction:column;z-index:100;transition:transform 0.3s;box-shadow:4px 0 28px rgba(26,85,201,0.07)}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(11,140,122,0.1)}
.logo-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:6px}
.logo-main{font-family:var(--font-title);font-size:22px;color:var(--ink);line-height:1.1}
.logo-sub{font-size:11px;color:var(--ink3);margin-top:4px;line-height:1.5}
.nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-section{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(13,10,30,0.32);font-weight:600;padding:12px 12px 6px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--ink2);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;margin-bottom:2px;border:1px solid transparent;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(11,140,122,0.07);color:var(--teal)}
.nav-item.active{background:linear-gradient(135deg,rgba(11,140,122,0.13) 0%,rgba(26,85,201,0.07) 100%);color:var(--teal);border-color:rgba(11,140,122,0.18)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.5}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(11,140,122,0.1)}
.project-badge{background:rgba(11,140,122,0.08);border:1px solid rgba(11,140,122,0.18);border-radius:8px;padding:8px 12px}
.pb-label{font-size:10px;color:var(--teal);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.pb-val{font-size:12px;color:var(--ink2);margin-top:2px}
.back-to-hub{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--ink3);font-size:12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-bottom:8px;font-family:var(--font-desc);transition:all 0.15s}
.back-to-hub:hover{background:rgba(11,140,122,0.08);color:var(--teal)}

/* ═══ MAIN ═══ */
.main{margin-left:240px;min-height:100vh;padding:32px 36px;display:none}
.page{display:none}.page.active{display:block;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:32px}
.page-eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:8px}
.page-title{font-family:var(--font-title);font-size:36px;color:var(--ink);line-height:1.1;font-weight:600}
.page-desc{font-size:14px;color:var(--ink3);margin-top:8px;line-height:1.6;max-width:520px}

/* ═══ CARDS / GRID / TILES ═══ */
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.card-pad{padding:24px}.card-sm-pad{padding:16px 20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-tile{background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--border);padding:20px;position:relative;overflow:hidden}
.stat-tile::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.st-teal::after{background:var(--teal)}.st-gold::after{background:var(--gold)}.st-blue::after{background:var(--blue)}.st-ink::after{background:var(--ink)}
.st-num{font-family:var(--font-title);font-size:36px;font-weight:600;line-height:1;margin-bottom:4px}
.st-teal .st-num{color:var(--teal)}.st-gold .st-num{color:var(--gold)}.st-blue .st-num{color:var(--blue)}.st-ink .st-num{color:var(--ink)}
.st-label{font-size:12px;color:var(--ink3);line-height:1.4}
.section-label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;color:var(--ink3);margin-bottom:12px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:var(--font-desc);cursor:pointer;transition:all 0.15s;border:none}
.btn:active{transform:scale(0.97)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#097a6a}
.btn-outline{background:none;border:1.5px solid var(--border2);color:var(--ink2)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-ghost{background:none;border:none;color:var(--ink3);font-size:13px;cursor:pointer;padding:6px 10px;border-radius:8px}.btn-ghost:hover{background:var(--cream);color:var(--ink)}
.btn-sm{height:30px;padding:0 12px;font-size:12px}
.btn-red{background:var(--red-light);color:var(--red);border:1px solid var(--red-light)}.btn-red:hover{background:var(--red);color:#fff}
.btn-gold{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold-light)}.btn-gold:hover{background:var(--gold);color:#fff}

/* ═══ BADGE ═══ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge-teal{background:var(--teal-light);color:var(--teal)}.badge-gold{background:var(--gold-light);color:var(--gold)}.badge-blue{background:var(--blue-light);color:var(--blue)}.badge-ink{background:rgba(13,10,30,0.06);color:var(--ink2)}.badge-red{background:var(--red-light);color:var(--red)}

/* ═══ FORMS ═══ */
.inp{height:40px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:0 14px;font-size:13px;font-family:var(--font-desc);width:100%;outline:none;transition:border-color 0.15s;background:#fff}.inp:focus{border-color:var(--teal)}
.textarea{border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-family:var(--font-desc);width:100%;min-height:80px;resize:vertical;outline:none;line-height:1.6;background:#fff}.textarea:focus{border-color:var(--teal)}
.inp-label{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;display:block}
.form-row{margin-bottom:16px}
select.inp{appearance:auto}

/* ═══ OVERLAY / MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(13,10,30,0.45);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:200}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:440px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow-md)}
.modal-lg{width:560px}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head-title{font-family:var(--font-title);font-size:18px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:8px;border:none;background:var(--cream);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--ink3)}.modal-close:hover{background:var(--red-light);color:var(--red)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ═══ HERO ═══ */
.hero-banner{background:linear-gradient(135deg,var(--ink) 0%,#1a1540 100%);border-radius:var(--radius);padding:40px 36px;margin-bottom:24px;color:#fff;position:relative;overflow:hidden}
.hero-banner::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(45,196,168,0.1)}
.hero-banner::after{content:'';position:absolute;bottom:-60px;left:30%;width:300px;height:150px;border-radius:50%;background:rgba(45,196,168,0.05)}
.hero-tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-mid);font-weight:600;margin-bottom:10px}
.hero-title{font-family:var(--font-title);font-size:32px;font-weight:600;line-height:1.1;margin-bottom:10px}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.7;max-width:480px}
.hero-actions{display:flex;gap:10px;margin-top:20px}
.btn-hero{height:40px;padding:0 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-desc);transition:all 0.15s}
.btn-hero:active{transform:scale(0.97)}
.btn-hero-primary{background:var(--teal);color:#fff}.btn-hero-primary:hover{background:#097a6a}
.btn-hero-ghost{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12)}.btn-hero-ghost:hover{background:rgba(255,255,255,0.14);color:#fff}

/* ═══ CHIPS ═══ */
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px 5px 5px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.chip.dim{opacity:0.5}.chip.dim:hover{opacity:0.8}
.chip-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.chip-x{width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;margin-left:2px}.chip-x:hover{background:rgba(0,0,0,0.25)}

/* ═══ CALENDAR ═══ */
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--ink2)}.cal-nav-btn:hover{border-color:var(--teal);color:var(--teal)}
.cal-month{font-family:var(--font-title);font-size:18px;font-weight:600;min-width:160px;text-align:center}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--ink3);padding:6px}
.cal-grid-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:70px;border-radius:8px;border:1px solid var(--border);padding:6px;cursor:pointer;position:relative;transition:all 0.15s;background:#fff}
.cal-cell:hover{border-color:var(--teal-mid);z-index:1}
.cal-cell.empty{border:none;cursor:default;background:transparent}
.cal-cell.is-today{border-color:var(--teal);background:rgba(11,140,122,0.04)}
.cal-cell.is-overlap{background:var(--teal-light);border-color:var(--teal)}
.cal-cell.has-meeting{border-color:var(--gold);box-shadow:inset 0 -3px 0 var(--gold)}
.day-num{font-size:12px;font-weight:600;color:var(--ink)}
.av-stack{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px}
.av-mini{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.overlap-tick{position:absolute;top:4px;right:4px;background:var(--teal);color:#fff;width:14px;height:14px;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
.note-dot{position:absolute;bottom:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#F59E0B}
.cal-meeting-pill{font-size:9px;background:var(--gold-light);color:var(--gold);padding:1px 5px;border-radius:4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend-row{display:flex;gap:18px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* ═══ PARTNER ROW (modal) ═══ */
.p-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s;margin-bottom:6px}
.p-row:hover{border-color:var(--teal-mid)}
.p-row.checked{border-color:var(--teal);background:var(--teal-light)}
.pr-ck{width:18px;height:18px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.p-row.checked .pr-ck{background:var(--teal);border-color:var(--teal)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.av-sm{width:24px;height:24px;font-size:9px}
.av-md{width:32px;height:32px;font-size:11px}

/* ═══ MEETING CARDS ═══ */
.meeting-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.mc-header{display:flex;align-items:center;gap:14px;padding:16px 20px;position:relative}
.mc-date-stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
.mc-info{flex:1}
.mc-title{font-size:15px;font-weight:600;margin-bottom:2px}
.mc-meta{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mc-dot{width:3px;height:3px;border-radius:50%;background:var(--ink3)}
.mc-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mc-expand{width:28px;height:28px;border-radius:8px;border:none;background:var(--cream);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--ink3)}.mc-expand:hover{background:#eee}
.mc-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border)}
.mc-body.open{display:block}
.mc-section{margin-bottom:14px;margin-top:14px}
.mc-sec-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);font-weight:600;margin-bottom:6px}
.attendee-chips{display:flex;flex-wrap:wrap;gap:6px}
.attendee-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 3px;border-radius:99px;background:var(--cream);font-size:11px;font-weight:500}

/* ═══ DOC CARDS ═══ */
.doc-card{display:flex;align-items:center;gap:14px;padding:16px 20px;background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px}
.doc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-title{font-size:14px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-meta{font-size:11px;color:var(--ink3)}
.doc-actions{display:flex;gap:6px;flex-shrink:0}

/* ═══ MoM ═══ */
.mom-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.mom-header{padding:20px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.mom-num{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:4px}
.mom-title{font-family:var(--font-title);font-size:18px;font-weight:600;margin-bottom:4px}
.mom-meta{font-size:12px;color:var(--ink3);display:flex;gap:12px;flex-wrap:wrap}
.mom-body{padding:0 24px 24px;border-top:1px solid var(--border)}
.mom-section-title{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);font-weight:600;margin:16px 0 8px}
.decision-item{display:flex;gap:8px;font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:4px}
.action-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ai-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s}
.ai-check.done{background:var(--teal);border-color:var(--teal)}
.ai-text{flex:1;font-size:13px;color:var(--ink2)}.ai-text.done{text-decoration:line-through;opacity:0.5}
.ai-owner{font-size:11px;padding:2px 10px;border-radius:99px;background:var(--cream);color:var(--ink3);font-weight:500}

/* ═══ TABS ═══ */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--cream);padding:4px;border-radius:10px;width:fit-content}
.tab{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--ink3);transition:all 0.15s;font-family:var(--font-desc)}
.tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(13,10,30,0.1)}

/* ═══ EMAIL ═══ */
.day-pill{display:inline-flex;align-items:center;padding:6px 14px;border-radius:8px;border:1.5px solid var(--border2);font-size:12px;font-weight:500;cursor:pointer;margin:3px;transition:all 0.15s}
.day-pill:hover{border-color:var(--teal-mid)}.day-pill.sel{background:var(--teal);color:#fff;border-color:var(--teal)}
.email-preview{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}

/* ═══ PROGRESS BAR ═══ */
.prog-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:99px;background:var(--teal);transition:width 0.5s}

/* ═══ QUICK LINKS ═══ */
.quick-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);text-decoration:none;color:var(--ink2);font-size:13px;font-weight:500;transition:all 0.15s}
.quick-link:hover{background:var(--cream)}
.ql-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ═══ UPCOMING ═══ */
.upcoming-item{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)}
.upcoming-item:last-child{border-bottom:none}
.upcoming-date-box{width:40px;height:40px;border-radius:8px;background:var(--teal-light);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.ud-day{font-family:var(--font-title);font-size:16px;font-weight:600;line-height:1;color:var(--teal)}
.ud-mon{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--teal);font-weight:600}
.ui-title{font-size:13px;font-weight:600}
.ui-sub{font-size:11px;color:var(--ink3)}
.ui-right{flex:1;display:flex;justify-content:flex-end}

/* ═══ PARTNER ROW DASH ═══ */
.partner-row-dash{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.partner-row-dash:last-of-type{border-bottom:none}
.pr-info{flex:1}.pr-name-dash{font-size:13px;font-weight:600}.pr-inst{font-size:11px;color:var(--ink3)}
.pr-avail{font-size:12px;font-weight:600}

/* ═══ COLLABORATOR ═══ */
.collab-section{margin-top:20px}
.collab-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.collab-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:8px;border:1px solid var(--border)}
.collab-email{flex:1;font-size:13px;font-weight:500}
.collab-role{font-size:11px;padding:2px 8px;border-radius:99px;background:var(--teal-light);color:var(--teal);font-weight:600}
.collab-remove{width:24px;height:24px;border-radius:6px;border:none;background:var(--cream);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--ink3)}.collab-remove:hover{background:var(--red-light);color:var(--red)}

/* ═══ BOOK MEETING CTA ═══ */
.book-meeting-cta{display:flex;align-items:center;gap:10px;padding:14px 28px;border-radius:99px;border:1px solid rgba(45,196,168,0.5);background:rgba(45,196,168,0.1);color:#2DC4A8;font-size:14px;font-weight:600;font-family:var(--font-desc);cursor:pointer;transition:all 0.2s;margin:0 auto}
.book-meeting-cta:hover{background:rgba(45,196,168,0.2);border-color:#2DC4A8;transform:translateY(-2px);box-shadow:0 8px 32px rgba(45,196,168,0.2)}

/* ═══ BOOKING MODAL ═══ */
.bk-overlay{position:fixed;inset:0;background:rgba(5,8,16,0.85);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;z-index:998;padding:20px}
.bk-overlay.show{display:flex}
.bk-modal{display:flex;width:100%;max-width:860px;max-height:90vh;border-radius:20px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)}
.bk-left{width:280px;flex-shrink:0;background:linear-gradient(180deg,#f6fffd 0%,#eaf9f6 52%,#eef6ff 100%);padding:32px 28px;display:flex;flex-direction:column;gap:0;overflow-y:auto;border-right:1px solid rgba(26,85,201,0.08)}
.bk-org-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0B8C7A,#2DC4A8);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.bk-org-logo svg{width:26px;height:26px}
.bk-org-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#2DC4A8;font-weight:600;margin-bottom:8px}
.bk-org-name{font-family:var(--font-title);font-size:22px;color:#0D0A1E;line-height:1.25;margin-bottom:12px}
.bk-org-dur{display:flex;align-items:center;gap:7px;font-size:13px;color:rgba(21,86,96,0.72);margin-bottom:16px}
.bk-org-desc{font-size:12px;color:rgba(21,86,96,0.7);line-height:1.7;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid rgba(26,85,201,0.08)}
.bk-project-filter{margin-top:auto}
.bk-filter-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(21,86,96,0.52);font-weight:600;margin-bottom:10px}
.bk-filter-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;border:1px solid rgba(26,85,201,0.12);font-size:11px;color:rgba(21,86,96,0.72);cursor:pointer;margin:3px 3px 3px 0;font-family:var(--font-desc);background:rgba(255,255,255,0.72);transition:all 0.15s}
.bk-filter-pill:hover{border-color:rgba(45,196,168,0.45);color:#0B8C7A}
.bk-filter-pill.active{background:rgba(45,196,168,0.15);border-color:#2DC4A8;color:#2DC4A8}

.bk-right{flex:1;background:linear-gradient(180deg,#ffffff 0%,#f4fcfb 54%,#edf6ff 100%);padding:32px 32px 28px;overflow-y:auto;position:relative}
.bk-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:1px solid rgba(26,85,201,0.12);background:rgba(255,255,255,0.82);color:rgba(21,86,96,0.62);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:var(--font-desc);z-index:5}
.bk-close:hover{background:#ffffff;color:#0B8C7A}

.bk-step{display:none;animation:fadeUp 0.25s ease}
.bk-step.active{display:block}
.bk-step-title{font-family:var(--font-title);font-size:20px;color:#0D0A1E;margin-bottom:4px}
.bk-step-sub{font-size:13px;color:rgba(21,86,96,0.62);margin-bottom:18px}

/* Calendar inside booking */
.bk-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.bk-cal-nav button{width:30px;height:30px;border-radius:8px;border:1px solid rgba(26,85,201,0.12);background:rgba(255,255,255,0.82);color:rgba(21,86,96,0.62);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;font-family:var(--font-desc);transition:all 0.15s}
.bk-cal-nav button:hover{background:#ffffff;color:#0B8C7A}
.bk-cal-nav span{font-size:15px;font-weight:600;color:#0D0A1E}
.bk-cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.bk-cal-header div{text-align:center;font-size:11px;font-weight:600;color:rgba(21,86,96,0.48);padding:4px 0}
.bk-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:18px}
.bk-day{text-align:center;padding:8px 4px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(26,85,201,0.06);transition:all 0.15s;color:rgba(21,86,96,0.82);min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;background:rgba(255,255,255,0.72)}
.bk-day:hover:not(.bk-day-empty):not(.bk-day-past):not(.bk-day-busy):not(.bk-day-unavailable){background:rgba(45,196,168,0.15);border-color:rgba(45,196,168,0.4);color:#2DC4A8}
.bk-day.bk-day-empty{cursor:default;border:none}
.bk-day.bk-day-past{color:rgba(21,86,96,0.22);cursor:not-allowed}
.bk-day.bk-day-today{border-color:rgba(26,85,201,0.22)}
.bk-day.bk-day-cesgs{border-color:rgba(45,196,168,0.25);background:rgba(45,196,168,0.05)}
.bk-day.bk-day-unavailable{color:rgba(255,255,255,0.22);cursor:not-allowed;background:rgba(255,255,255,0.03)}
.bk-day.bk-day-busy{background:rgba(193,59,59,0.08);color:rgba(255,255,255,0.35);cursor:not-allowed;border-color:rgba(193,59,59,0.2)}
.bk-day.bk-day-busy::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:#C13B3B;margin-top:2px}
.bk-day.bk-day-selected{background:linear-gradient(135deg,#0B8C7A,#2DC4A8)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 4px 16px rgba(11,140,122,0.4)}
.bk-day.bk-day-pref{box-shadow:inset 0 0 0 1px rgba(45,196,168,0.65)}
.bk-day-num{font-size:13px}
.bk-busy-label{font-size:9px;color:#C13B3B;line-height:1;margin-top:1px}
.bk-day-label{font-size:9px;line-height:1.1;margin-top:2px;color:#2DC4A8;font-weight:600}
.bk-day-label.busy{color:#FCA5A5}
.bk-day-label.muted{color:rgba(255,255,255,0.3)}

/* Time slots */
.bk-time-section{border-top:1px solid rgba(255,255,255,0.07);padding-top:16px;animation:fadeUp 0.2s ease}
.bk-time-label{font-size:12px;color:rgba(21,86,96,0.6);margin-bottom:10px;font-weight:500}
.bk-time-slots{display:flex;flex-wrap:wrap;gap:8px}
.bk-slot{padding:10px 14px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);cursor:pointer;font-family:var(--font-desc);background:none;transition:all 0.15s;min-width:150px;display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.bk-slot small{font-size:10px;line-height:1.2;color:rgba(255,255,255,0.38)}
.bk-slot.bk-slot-offered{border-color:rgba(45,196,168,0.28);background:rgba(45,196,168,0.06)}
.bk-slot:hover:not(.bk-slot-taken):not(.bk-slot-unavailable){border-color:#2DC4A8;color:#2DC4A8;background:rgba(45,196,168,0.08)}
.bk-slot.selected{background:linear-gradient(135deg,#0B8C7A,#2DC4A8);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(11,140,122,0.3)}
.bk-slot.selected small{color:rgba(255,255,255,0.82)}
.bk-slot.bk-slot-taken{color:rgba(255,255,255,0.35);cursor:not-allowed;border-color:rgba(255,255,255,0.05);text-decoration:line-through;background:rgba(255,255,255,0.03)}
.bk-slot.bk-slot-taken small{color:#FCA5A5}
.bk-slot.bk-slot-unavailable{color:rgba(255,255,255,0.24);cursor:not-allowed;border-color:rgba(255,255,255,0.04);background:rgba(255,255,255,0.02)}
.bk-slot.bk-slot-unavailable small{color:rgba(255,255,255,0.22)}
.bk-slot-meta{display:flex;flex-direction:column;gap:4px;width:100%;margin-top:2px}
.bk-slot-status-line{font-size:10px;line-height:1.3;color:rgba(13,10,30,0.52)}
.bk-slot-person-list{display:flex;flex-direction:column;gap:3px;width:100%}
.bk-slot-person{font-size:10px;line-height:1.35;padding:5px 8px;border-radius:10px;background:rgba(13,10,30,0.04);color:rgba(13,10,30,0.72);white-space:normal;width:100%}
.bk-slot-person.unavailable{background:rgba(193,59,59,0.08);color:#A12E2E;border:1px solid rgba(193,59,59,0.12)}
.bk-slot-person.available{background:rgba(11,140,122,0.08);color:#0B8C7A;border:1px solid rgba(11,140,122,0.12)}
.bk-legend{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0 0}
.bk-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.46)}
.bk-legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.bk-selected-pref-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.bk-pref-chip{display:inline-flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:18px;background:rgba(45,196,168,0.12);border:1px solid rgba(45,196,168,0.28);font-size:12px;color:#d7fff8;max-width:100%;line-height:1.45}
.bk-pref-chip button{border:none;background:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:12px;padding:0;margin-top:2px}
.bk-pref-chip button:hover{color:#fff}
.bk-pref-empty{font-size:12px;color:rgba(255,255,255,0.35)}
.bk-inline-note{font-size:11px;color:rgba(255,255,255,0.35);line-height:1.5;margin-top:10px}

/* Booking step 2 */
.bk-back-btn{background:none;border:none;color:rgba(21,86,96,0.58);font-size:13px;cursor:pointer;font-family:var(--font-desc);padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px;transition:color 0.15s}
.bk-back-btn:hover{color:#0B8C7A}
.bk-booking-summary{background:rgba(45,196,168,0.08);border:1px solid rgba(45,196,168,0.2);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.bk-form{display:flex;flex-direction:column;gap:14px}
.bk-field label{display:block;font-size:11px;color:rgba(21,86,96,0.54);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px}
.bk-inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(26,85,201,0.12);background:rgba(255,255,255,0.9);color:#0D0A1E;font-size:13px;font-family:var(--font-desc);outline:none;transition:border-color 0.15s}
.bk-inp:focus{border-color:#2DC4A8}
.bk-inp::placeholder{color:rgba(21,86,96,0.28)}
.bk-textarea{min-height:80px;resize:vertical}
select.bk-inp option{background:#ffffff;color:#0D0A1E}

#bk-name-account[multiple],#sched-event-owner[multiple]{min-height:150px;height:auto;padding:10px 12px}
#bk-name-account[multiple] option,#sched-event-owner[multiple] option{padding:6px 8px}
.bk-account-checklist{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow:auto;padding:4px 2px}
.bk-account-check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid rgba(13,10,30,0.08);border-radius:12px;background:rgba(255,255,255,0.88);cursor:pointer;transition:all 0.15s}
.bk-account-check-item:hover{border-color:rgba(45,196,168,0.34);background:rgba(45,196,168,0.05)}
.bk-account-check-item input{margin-top:2px}
.bk-account-check-meta{display:flex;flex-direction:column;gap:3px}
.bk-account-check-name{font-size:13px;font-weight:600;color:var(--ink)}
.bk-account-check-sub{font-size:11px;color:var(--ink3);line-height:1.5}

.bk-submit-btn{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#0B8C7A,#2DC4A8);color:#fff;font-size:14px;font-weight:600;font-family:var(--font-desc);cursor:pointer;margin-top:20px;transition:opacity 0.15s}
.bk-submit-btn:hover{opacity:0.9}

/* Step 3 success */
.bk-success{text-align:center;padding:40px 20px}
.bk-success-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0B8C7A,#2DC4A8);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 32px rgba(11,140,122,0.4)}
.bk-success-title{font-family:var(--font-title);font-size:24px;color:#0D0A1E;margin-bottom:10px}
.bk-success-sub{font-size:14px;color:rgba(21,86,96,0.7);margin-bottom:20px;line-height:1.6}
.bk-success-detail{background:rgba(45,196,168,0.08);border:1px solid rgba(45,196,168,0.2);border-radius:14px;padding:16px 20px;text-align:left;font-size:13px;color:rgba(21,86,96,0.78);line-height:1.9}

@media(max-width:700px){.bk-modal{flex-direction:column;max-height:95vh}.bk-left{width:100%;padding:20px}.bk-right{padding:20px}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:12px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;transition:transform 0.3s;box-shadow:var(--shadow-md)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ═══ HAMBURGER ═══ */
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:150;width:36px;height:36px;border-radius:8px;border:1px solid rgba(11,140,122,0.18);background:rgba(255,255,255,0.92);cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 2px 12px rgba(26,85,201,0.1);backdrop-filter:blur(8px)}
.hamburger span{width:18px;height:2px;background:var(--teal);border-radius:2px}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:24px 16px;padding-top:60px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .hero-title{font-size:24px}
  .landing-title{font-size:28px}
  .project-grid{grid-template-columns:1fr}
}

/* ═══ LIGHT GREEN-BLUE OVERRIDES ═══ */

.landing{background:linear-gradient(180deg,#f7fffd 0%,#f4fbff 45%,#ffffff 100%)}
.landing::before{background:radial-gradient(ellipse at center,rgba(45,196,168,0.24) 0%,rgba(45,196,168,0.08) 44%,transparent 72%)}
.landing::after{background:radial-gradient(ellipse at center,rgba(26,85,201,0.14) 0%,rgba(45,196,168,0.08) 36%,transparent 68%)}
.landing-title{background:linear-gradient(135deg,#0D5C63 0%,#0B8C7A 42%,#1A55C9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.landing-sub{color:rgba(13,10,30,0.64)}

/* ═══ ADMIN CONSOLE TABS ═══ */

.admin-console{position:fixed;inset:0;background:rgba(236,247,247,0.82);backdrop-filter:blur(10px);z-index:1200;padding:22px;overflow:auto}

.admin-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}.admin-title{font-family:var(--font-title);font-size:30px;line-height:1.1;color:var(--ink)}.admin-subtitle{font-size:14px;color:var(--ink3);margin-top:6px}

/* Landing login layout */
.landing-shell{position:relative;z-index:1;width:100%;max-width:1140px;display:grid;grid-template-columns:minmax(0,1.08fr) minmax(360px,420px);gap:28px;align-items:center}
.landing-left{display:flex;flex-direction:column;align-items:flex-start}
.landing-left .landing-header{text-align:left;margin-bottom:24px}
.landing-left .landing-logo{margin:0 0 20px}
.landing-left .landing-sub{max-width:620px;color:rgba(255,255,255,0.62)}
.landing-cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:4px}
.signin-card{width:100%;background:rgba(255,255,255,0.94);border:1px solid rgba(45,196,168,0.14);border-radius:24px;padding:24px 24px 22px;box-shadow:0 30px 70px rgba(10,55,95,0.12);backdrop-filter:blur(14px)}
.signin-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.signin-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:linear-gradient(135deg,rgba(45,196,168,0.14) 0%,rgba(26,85,201,0.1) 100%);border:1px solid rgba(45,196,168,0.18);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#0B6D71}
.signin-title{font-family:var(--font-title);font-size:30px;line-height:1.08;color:var(--ink);margin-bottom:8px}
.signin-sub{font-size:13px;line-height:1.7;color:var(--ink3);margin-bottom:16px}
.signin-demo{margin-bottom:16px;padding:14px 16px;border-radius:16px;background:linear-gradient(135deg,rgba(45,196,168,0.12) 0%,rgba(26,85,201,0.08) 100%);border:1px solid rgba(45,196,168,0.18)}
.signin-demo-title{font-size:11px;color:#0B8C7A;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.signin-demo-body{font-size:13px;color:var(--ink2);line-height:1.65}
.signin-label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:7px}
.signin-input{width:100%;height:48px;border:1.5px solid rgba(13,10,30,0.12);border-radius:14px;padding:0 14px;background:#fff;font-size:14px;font-family:var(--font-desc);outline:none;transition:border-color .15s,box-shadow .15s;color:var(--ink)}
.signin-input:focus{border-color:#2DC4A8;box-shadow:0 0 0 3px rgba(45,196,168,0.12)}
.signin-input.error{border-color:#C13B3B;box-shadow:0 0 0 3px rgba(193,59,59,0.12)}
.signin-action{width:100%;height:48px;border:none;border-radius:14px;background:linear-gradient(135deg,#0B8C7A,#1A55C9);color:#fff;font-size:14px;font-weight:700;font-family:var(--font-desc);cursor:pointer;transition:transform .15s,opacity .15s,box-shadow .15s;box-shadow:0 16px 30px rgba(26,85,201,0.15)}
.signin-action:hover{opacity:.94}
.signin-action:active{transform:scale(.98)}
.signin-secondary{width:100%;height:42px;border-radius:12px;border:1px solid rgba(13,10,30,0.1);background:#fff;color:var(--ink2);font-size:13px;font-weight:600;font-family:var(--font-desc);cursor:pointer;transition:all .15s}
.signin-secondary:hover{border-color:rgba(45,196,168,0.26);color:#0B8C7A;background:rgba(45,196,168,0.05)}
.signin-err{font-size:12px;color:#C13B3B;min-height:18px;margin:8px 0 2px}
.signin-note{font-size:11px;color:var(--ink3);line-height:1.65;margin-top:12px}
.signin-project-wrap{display:none;margin-bottom:16px}
.signin-project-list{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.signin-project-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;border:1px solid rgba(13,10,30,0.08);background:#fff;color:var(--ink);font-family:var(--font-desc);cursor:pointer;width:100%;text-align:left;transition:all .15s}
.signin-project-btn:hover{border-color:rgba(45,196,168,0.34);background:rgba(45,196,168,0.06);transform:translateY(-1px)}
.signin-project-btn .arrow{margin-left:auto;color:#0B8C7A;font-size:20px}
.signin-helper-link{font-size:12px;color:rgba(255,255,255,0.5);margin-top:12px}
.signin-helper-link button{background:none;border:none;color:#9ff0df;text-decoration:underline;cursor:pointer;font:inherit;padding:0}
@media(max-width:920px){.landing-shell{grid-template-columns:1fr}.landing-left{align-items:center}.landing-left .landing-header{text-align:center}.landing-left .landing-logo{margin:0 auto 20px}.landing-left .landing-sub{max-width:520px}.landing-cta-row{justify-content:center}.signin-card{max-width:520px;margin:0 auto}}



/* ═══ INTEGRATED SUPER ADMIN ═══ */
.superadmin-shell{position:fixed;inset:0;z-index:1500;background:#eef6ff;display:none}
.superadmin-shell.show{display:block}
.superadmin-embed-frame{width:100%;height:100%;border:none;background:#fff}
.superadmin-back-btn{position:fixed;top:16px;left:16px;z-index:1510;display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 16px;border:none;border-radius:999px;background:rgba(13,10,30,0.78);color:#fff;font-size:13px;font-weight:700;font-family:var(--font-desc);cursor:pointer;backdrop-filter:blur(12px);box-shadow:0 12px 30px rgba(13,10,30,0.18);transition:all 0.15s}
.superadmin-back-btn:hover{background:rgba(13,10,30,0.92);transform:translateY(-1px)}
.superadmin-back-btn svg{width:14px;height:14px;flex-shrink:0}
@media(max-width:768px){.superadmin-back-btn{top:12px;left:12px;padding:0 14px;height:38px;font-size:12px}}
